name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-pc-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Get version from package.json
        id: package_version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=v$version" >> $GITHUB_OUTPUT

      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = "${{ steps.package_version.outputs.version }}";
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log(`Tag ${tagName} created.`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`Tag ${tagName} already exists.`);
              } else {
                throw error;
              }
            }

      - name: Get commit message
        id: commit_message
        shell: bash
        run: |
          delimiter="$(node -p "crypto.randomUUID()")"
          {
            echo "message<<$delimiter"
            git log -1 --pretty=%B
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.package_version.outputs.version }}
          releaseName: 'Release ${{ steps.package_version.outputs.version }}'
          releaseBody: ${{ steps.commit_message.outputs.message }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true


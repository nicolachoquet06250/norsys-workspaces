name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-pc-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import GPG key (for signed tag)
        if: matrix.platform == 'ubuntu-22.04'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Get version from package.json
        id: package_version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=v$version" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          tag_name="${{ steps.package_version.outputs.version }}"
          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create signed tag
        if: steps.check_tag.outputs.exists == 'false' && matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          tag_name="${{ steps.package_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign true
          git config tag.gpgSign true
          git tag -s "$tag_name" -m "Release $tag_name"
          git push origin "$tag_name"

      - name: Get commit message
        if: steps.check_tag.outputs.exists == 'false'
        id: commit_message
        shell: bash
        run: |
          delimiter="$((node -p "crypto.randomUUID()")"
          {
            echo "message<<$delimiter"
            git log -1 --pretty=%B
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.package_version.outputs.version }}
          releaseName: 'Release ${{ steps.package_version.outputs.version }}'
          releaseBody: ${{ steps.commit_message.outputs.message }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

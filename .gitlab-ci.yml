stages:
  - prepare
  - build
  - release

variables:
  PACKAGE_NAME: "app"
  CARGO_TERM_COLOR: "always"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

prepare_release:
  stage: prepare
  image: node:lts
  script:
    - apt-get update && apt-get install -y git curl jq
    - VERSION="v$(node -p "require('./package.json').version")"
    - echo "VERSION=$VERSION" >> release.env
    - echo "PACKAGE_VERSION=${VERSION#v}" >> release.env
    - |
      if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
        echo "TAG_EXISTS=true" >> release.env
        echo "Tag $VERSION already exists"
      else
        echo "TAG_EXISTS=false" >> release.env
        MESSAGE="$(git log -1 --pretty=%B)"
        printf "%s\n" "$MESSAGE" > release_body.md

        curl --fail --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          --form "tag_name=$VERSION" \
          --form "ref=$CI_COMMIT_SHA" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/tags"
      fi
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release_body.md

build_linux:
  stage: build
  image: rust:latest
  needs:
    - prepare_release
  cache:
    key: linux-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - src-tauri/target/
      - node_modules/
  before_script:
    - apt-get update
    - apt-get install -y curl nodejs npm libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
  script:
    - |
      if [ "$TAG_EXISTS" = "true" ]; then
        echo "Release already exists, skipping build."
        exit 0
      fi
    - npm install
    - rm -rf src-tauri/target/release/bundle
    - npm run tauri build
  artifacts:
    when: always
    paths:
      - src-tauri/target/release/bundle/**/*

build_windows:
  stage: build
  image: rust:latest
  needs:
    - prepare_release
  cache:
    key: windows-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - src-tauri/target/
      - node_modules/
  before_script:
    - apt-get update
    - apt-get install -y nodejs npm curl wget file nsis lld llvm mingw-w64
    - apt-get install -y curl nodejs npm libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
  script:
    - |
      if [ "$TAG_EXISTS" = "true" ]; then
        echo "Release already exists, skipping build."
        exit 0
      fi
    - rustup default stable
    - rustup target add x86_64-pc-windows-gnu
    - npm install
    - rm -rf src-tauri/target/x86_64-pc-windows-gnu/release/bundle
    - npx tauri build --target x86_64-pc-windows-gnu --bundles nsis
  artifacts:
    when: always
    paths:
      - src-tauri/target/x86_64-pc-windows-*/release/bundle/**/*
      - src-tauri/target/release/bundle/**/*

publish_release:
  stage: release
  image: debian:bookworm-slim
  needs:
    - job: prepare_release
      artifacts: true
    - job: build_linux
      artifacts: true
    - job: build_windows
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl ca-certificates findutils coreutils jq
    - curl --location --output /usr/local/bin/release-cli "https://gitlab.com/api/v4/projects/gitlab-org%2Frelease-cli/packages/generic/release-cli/latest/release-cli-linux-amd64"
    - chmod +x /usr/local/bin/release-cli
  script:
    - |
      if [ "$TAG_EXISTS" = "true" ]; then
        echo "Release already exists, skipping."
        exit 0
      fi

      # 1. Collecter tous les fichiers
      mkdir -p src-tauri/target/release/bundle src-tauri/target/x86_64-pc-windows-gnu/release/bundle
      find \
        $(test -d src-tauri/target/release/bundle && echo src-tauri/target/release/bundle) \
        $(test -d src-tauri/target/x86_64-pc-windows-gnu/release/bundle && echo src-tauri/target/x86_64-pc-windows-gnu/release/bundle) \
        -type f \( \
          -name "*.deb" -o \
          -name "*.AppImage" -o \
          -name "*.rpm" -o \
          -name "*.msi" -o \
          -name "*.exe" -o \
          -name "*.zip" -o \
          -name "*.json" -o \
          -name "*.sig" \
        \) -print > files.txt

      # 2. Uploader les fichiers vers le Package Registry
      while read file; do
        filename="$(basename "$file")"

        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$file" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$PACKAGE_VERSION/$filename"
      done < files.txt

      # 3. Préparer le fichier latest.json
      PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      NOTES=$(cat release_body.md | jq -Rs .)
      
      # Initialisation du JSON
      echo '{"version":"'$PACKAGE_VERSION'","notes":'$NOTES',"pub_date":"'$PUB_DATE'","platforms":{}}' > latest.json

      # Fonction pour ajouter une plateforme
      add_platform() {
        local key=$1
        local pattern=$2
        local file_path=$(grep "$pattern" files.txt | head -n 1)
        if [ -n "$file_path" ]; then
          local filename=$(basename "$file_path")
          local sig_file="${file_path}.sig"
          local signature=""
          if [ -f "$sig_file" ]; then
            signature=$(cat "$sig_file")
          fi
          local url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$PACKAGE_VERSION/$filename"
          
          jq --arg key "$key" \
             --arg url "$url" \
             --arg sig "$signature" \
             '.platforms[$key] = {"signature": $sig, "url": $url}' \
             latest.json > latest.tmp && mv latest.tmp latest.json
        fi
      }

      add_platform "linux-x86_64" "\.AppImage$"
      add_platform "linux-x86_64-appimage" "\.AppImage$"
      add_platform "linux-x86_64-deb" "\.deb$"
      add_platform "linux-x86_64-rpm" "\.rpm$"
      add_platform "windows-x86_64-nsis" "\.exe$"
      
      LATEST_URL="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/latest/latest.json"

      # 4. Uploader latest.json vers la version spécifique et la version "latest"
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "latest.json" \
        "$LATEST_URL"

      # 5. Préparer les liens d'assets pour la release
      ASSETS=""
      while read file; do
        filename="$(basename "$file")"
        url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$PACKAGE_VERSION/$filename"

        ASSETS="$ASSETS --assets-link {\"name\":\"$filename\",\"url\":\"$url\"}"
      done < files.txt
      
      # Ajouter latest.json aux assets
      ASSETS="$ASSETS --assets-link {\"name\":\"latest.json\",\"url\":\"$LATEST_URL\"}"

      # 6. Créer la release
      release-cli create \
        --name "Release $VERSION" \
        --tag-name "$VERSION" \
        --description release_body.md \
        $ASSETS